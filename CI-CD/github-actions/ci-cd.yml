name: CareerSaathi CI-CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-style: '18'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json

    - name: Install & Verify Backend
      run: |
        cd backend
        npm install
        npm run build --if-present

    - name: Install & Verify Frontend
      run: |
        cd frontend
        npm install
        npm run build

    - name: Simulate Production Deployment
      run: |
        echo "Simulating server delivery package pushes to Vercel and Railway API endpoints..."
        echo "Deployment check verified!"
